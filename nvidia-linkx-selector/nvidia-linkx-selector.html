.back-button:hover{background:rgba(255,255,255,.3);transform:translateX(-2px)}
.header h1{font-size:1.3rem}
.header h1 .badge{display:inline-block;background:var(--accent);color:#000;padding:.1rem .5rem;border-radius:3px;font-size:.7rem;font-weight:700;margin-left:.5rem}
.header .subtitle{opacity:.7;font-size:.8rem}
.layout{display:flex;height:calc(100vh - 52px);overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.sidebar-toggle{display:none;position:fixed;top:52px;left:0;z-index:100;background:var(--accent);color:#000;border:none;padding:.4rem .6rem;cursor:pointer;font-size:1rem}
.tree-item{display:flex;align-items:center;gap:.35rem;padding:.35rem .6rem;padding-left:calc(.6rem + var(--depth,0)*1rem);cursor:pointer;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s;user-select:none}
.tree-item:hover{background:#e9ecef}
.tree-item.active{background:var(--accent);color:#000;font-weight:600}
.tree-item .arrow{font-size:.65rem;transition:transform .2s;flex-shrink:0;width:14px;text-align:center}
.tree-item .arrow.open{transform:rotate(90deg)}
.tree-item .icon{flex-shrink:0}
.tree-children{display:none}
.tree-children.open{display:block}
.main{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.section-title{font-size:1.1rem;font-weight:700;margin:1rem 0 .6rem;padding-bottom:.25rem;border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:.5rem}
.section-title .icon{font-size:1.2rem}
.legend{display:flex;flex-wrap:wrap;gap:.6rem;margin:.5rem 0;font-size:.82rem}
.legend span{display:flex;align-items:center;gap:.25rem}
.legend .dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:.8rem;overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:.6rem .8rem;cursor:pointer;user-select:none}
.card-header:hover{background:#f0f0f0}
.card-header .name{font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:.4rem}
.card-header .name .tag{font-size:.65rem;padding:.1rem .35rem;border-radius:3px;color:#fff;font-weight:600}
.card-header .summary{color:var(--muted);font-size:.78rem}
.card-header .arrow{transition:transform .2s;font-size:.85rem;color:var(--muted)}
.card.open .card-header .arrow{transform:rotate(90deg)}
.card-body{display:none;padding:0 .8rem .6rem}
.card.open .card-body{display:block}
.rate-box{display:flex;flex-wrap:wrap;gap:.5rem;margin:.3rem 0 .5rem}
.rate-section{flex:1;min-width:200px;border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem}
.rate-section .rate-title{font-weight:700;font-size:.78rem;margin-bottom:.2rem;display:flex;align-items:center;gap:.25rem}
.rate-section .rate-list{display:flex;flex-wrap:wrap;gap:.25rem}
.rate-chip{font-size:.72rem;padding:.1rem .35rem;border-radius:3px;background:#e9ecef;font-weight:500}
.rate-chip.active{background:var(--accent);color:#000;font-weight:700}
.rate-note{font-size:.7rem;color:var(--muted);margin-top:.15rem;font-style:italic}
.spec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.3rem;margin:.4rem 0}
.spec-item{display:flex;gap:.25rem;font-size:.78rem;padding:.15rem .35rem;background:#f8f9fa;border-radius:3px}
.spec-item .label{color:var(--muted);white-space:nowrap;min-width:70px}
.spec-item .value{font-weight:500}
.mod-table{width:100%;border-collapse:collapse;font-size:.78rem;margin:.4rem 0}
.mod-table th{background:#f0f0f0;padding:.3rem .45rem;text-align:left;font-weight:600;white-space:nowrap;border-bottom:2px solid var(--border)}
.mod-table td{padding:.3rem .45rem;border-bottom:1px solid #eee;vertical-align:top}
.mod-table tr:hover td{background:#f8f9fa}
.mod-table .pn{font-weight:600;cursor:pointer;color:var(--accent2)}
.mod-table .pn:hover{text-decoration:underline}
.badge-ib{background:var(--ib);color:#fff;padding:.05rem .3rem;border-radius:2px;font-size:.65rem;font-weight:600}
.badge-eth{background:var(--eth);color:#fff;padding:.05rem .3rem;border-radius:2px;font-size:.65rem;font-weight:600}
.badge-linkx{background:var(--linkx);color:#000;padding:.05rem .3rem;border-radius:2px;font-size:.65rem;font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:10px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;padding:1.5rem;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h2{font-size:1.1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.modal .pn-display{font-size:1.3rem;font-weight:700;font-family:monospace;letter-spacing:.5px;margin:.3rem 0;display:flex;align-items:center;gap:.5rem}
.copy-btn{display:inline-flex;align-items:center;gap:.2rem;padding:.15rem .4rem;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-size:.72rem;color:var(--muted);transition:all .2s}
.copy-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.copy-btn.copied{background:var(--accent);color:#000;border-color:var(--accent)}
.device-link{color:inherit;text-decoration:none}
.device-link:hover{text-decoration:underline;color:var(--accent)}
.dev-name-wrap{display:inline-flex;align-items:center;gap:.25rem}
.dev-name-wrap .copy-btn{font-size:.6rem;padding:.05rem .25rem}
.doc-link{display:inline-flex;align-items:center;gap:.2rem;padding:.1rem .35rem;border:1px solid var(--accent);border-radius:3px;background:transparent;cursor:pointer;font-size:.68rem;color:var(--accent);text-decoration:none;transition:all .2s;margin-left:.3rem}
.doc-link:hover{background:var(--accent);color:#000}
.modal .close{float:right;cursor:pointer;font-size:1.2rem;color:var(--muted);border:none;background:none}
.modal .close:hover{color:var(--text)}
.modal .spec-grid{margin:.5rem 0}
.note{background:#fff3cd;border-left:3px solid #ffc107;padding:.4rem .6rem;font-size:.78rem;margin:.4rem 0;border-radius:0 4px 4px 0}
.note strong{color:#856404}
.arch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin:.8rem 0}
.arch-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}

.arch-badge{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.75rem;font-weight:700;color:#fff}
.arch-badge.hopper{background:#76b900}
.arch-badge.blackwell{background:#1a1a2e}
.arch-badge.rubin{background:#0d6efd}
.arch-sub{font-size:.78rem;color:var(--muted)}
.arch-body{padding:.5rem .8rem}
.arch-row{display:flex;gap:.4rem;padding:.25rem 0;font-size:.78rem;border-bottom:1px solid #f0f0f0}
.arch-row:last-child{border-bottom:none}
.arch-label{color:var(--muted);white-space:nowrap;min-width:90px;font-weight:600}
.arch-val{font-weight:400}
.footer{text-align:center;padding:1rem;color:var(--muted);font-size:.75rem;border-top:1px solid var(--border);margin-top:1.5rem}
.app-footer{background:var(--card);border-top:1px solid var(--border);padding:.5rem 0;margin-top:auto;text-align:center}
.app-footer .footer-content{max-width:1200px;margin:0 auto;padding:0 1rem}

.app-footer .footer-links{display:flex;justify-content:center;align-items:center;gap:.75rem;flex-wrap:wrap;margin-top:.2rem}
.app-footer .separator{color:#ccc}

.sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform .25s}

.sidebar-toggle{display:block}
.main{padding:.8rem}
.arch-grid{grid-template-columns:1fr}
.spec-grid{grid-template-columns:1fr}

function protoBadges(p){return p.split("/").map(x=>x.trim()).map(x=>x.startsWith("IB")?`<span class="badge-ib">${x}</span>`:`<span class="badge-eth">${x}</span>`).join(" ")}

function renderRateBox(d){
let h='<div class="rate-box">';
if(d.ib){
h+=`<div class="rate-section"><div class="rate-title"><span class="badge-ib">IB</span> InfiniBand</div><div class="rate-list">`;
d.ib.rates.forEach((r,i)=>{h+=`<span class="rate-chip${d.ib.active.includes(i)?' active':''}">${r}</span>`});
h+=`</div><div class="rate-note">SerDes: ${d.ib.serdes}</div>`;
if(d.ib.note)h+=`<div class="rate-note">${d.ib.note}</div>`;
h+='</div>'}
if(d.eth){
h+=`<div class="rate-section"><div class="rate-title"><span class="badge-eth">ETH</span> Ethernet</div><div class="rate-list">`;
d.eth.rates.forEach((r,i)=>{h+=`<span class="rate-chip${d.eth.active.includes(i)?' active':''}">${r}</span>`});
h+=`</div><div class="rate-note">SerDes: ${d.eth.serdes}</div>`;
if(d.eth.note)h+=`<div class="rate-note">${d.eth.note}</div>`;
h+='</div>'}
h+='</div>';return h}

function renderCard(d){
const specHtml=Object.entries(d.specs).map(([k,v])=>`<div class="spec-item"><span class="label">${k}</span><span class="value">${v}</span></div>`).join("");
const skuHtml=d.skus?`<div style="margin:.4rem 0"><div style="font-weight:600;font-size:.85rem;margin-bottom:.2rem">具体型号</div><table class="mod-table"><thead><tr><th>型号</th><th>OPN</th><th>高度</th><th>冷却</th><th>电源</th><th>端口</th><th>备注</th></tr></thead><tbody>${d.skus.map(s=>`<tr><td class="pn" onclick="copyPN(this,'${s.model}')" title="点击复制">${s.model}</td><td class="pn" onclick="copyPN(this,'${s.opn}')" title="点击复制">${s.opn}</td><td>${s.height}</td><td>${s.cooling}</td><td>${s.power}</td><td>${s.ports}</td><td>${s.note}</td></tr>`).join("")}</tbody></table></div>`:"";
const modHtml=d.modules.length?`<table class="mod-table"><thead><tr><th>LinkX 型号</th><th>速率</th><th>距离</th><th>协议</th><th>备注</th></tr></thead><tbody>${d.modules.map(m=>{const mLink=MOD_URL[m.pn]?`<a class="doc-link" href="${MOD_URL[m.pn]}" target="_blank" title="官方文档">&#x1F517;</a>`:"";return`<tr><td class="pn" onclick="showModule('${m.pn}',${JSON.stringify(m.detail||{}).replace(/"/g,'&quot;')})">${m.pn}${mLink}</td><td>${m.rate}</td><td>${m.dist}</td><td>${protoBadges(m.proto)}</td><td>${m.note}</td></tr>`}).join("")}</tbody></table>`:"";
const tagHtml=d.tags.map(t=>t==="IB"?`<span class="tag" style="background:var(--ib)">IB</span>`:t==="ETH"?`<span class="tag" style="background:var(--eth)">ETH</span>`:t==="CPO"?`<span class="tag" style="background:#9c27b0">CPO</span>`:t==="DPU"?`<span class="tag" style="background:#607d8b">DPU</span>`:"").join("");
const nameHtml=DEV_URL[d.id]?`<span class="dev-name-wrap"><a class="device-link" href="${DEV_URL[d.id]}" target="_blank" title="官方文档">${d.name}</a><button class="copy-btn" onclick="event.stopPropagation();copyPN(this,'${d.name}')" title="复制">&#x1F4CB;</button></span>`:`<span class="dev-name-wrap">${d.name}<button class="copy-btn" onclick="event.stopPropagation();copyPN(this,'${d.name}')" title="复制">&#x1F4CB;</button></span>`;
return`<div class="card" data-cat="${d.cat}" data-id="${d.id}"><div class="card-header" onclick="toggleCard('${d.id}')"><span class="name">${nameHtml} ${tagHtml}</span><span class="summary">${d.summary}</span><span class="arrow">&#x25B6;</span></div><div class="card-body">${renderRateBox(d)}<div class="spec-grid">${specHtml}</div>${skuHtml}${d.modules.length?`<div style="margin-top:.4rem;font-weight:600;font-size:.85rem">LinkX 原厂光模块</div>`:""}${modHtml}</div></div>`}

html+=`<table class="mod-table"><thead><tr><th>型号</th><th>速率</th><th>封装</th><th>散热</th><th>颜色标识</th><th>光纤</th><th>波长</th><th>距离</th><th>连接器</th><th>功耗</th><th>协议</th><th>备注</th><th>Application</th></tr></thead><tbody>`;
g.items.forEach(it=>{
const pnCell=MOD_URL[it.pn]?`<td class="pn"><span onclick="copyPN(this,'${it.pn}')" title="点击复制" style="cursor:pointer">${it.pn}</span><a class="doc-link" href="${MOD_URL[it.pn]}" target="_blank" title="官方文档">&#x1F517;</a></td>`:`<td class="pn" onclick="copyPN(this,'${it.pn}')" title="点击复制">${it.pn}</td>`;
const app=MOD_APP[it.pn]||"";
html+=`<tr>${pnCell}<td>${it.rate}</td><td>${it.form||"-"}</td><td>${it.top||"-"}</td><td>${it.color||"-"}</td><td>${it.fiber}</td><td>${it.wl}</td><td>${it.dist}</td><td>${it.conn}</td><td>${it.pwr}</td><td>${protoBadges(it.proto)}</td><td>${it.note}</td><td style="font-size:.68rem;max-width:200px">${app}</td></tr>`});
html+=`</tbody></table>`});
return html}

function showModule(pn,detail){
const m=document.getElementById("modal");
const detailHtml=Object.entries(detail).map(([k,v])=>`<div class="spec-item"><span class="label">${k}</span><span class="value">${v}</span></div>`).join("");
const docLink=MOD_URL[pn]?`<a class="doc-link" href="${MOD_URL[pn]}" target="_blank">&#x1F517; 官方文档</a>`:"";
m.innerHTML=`<button class="close" onclick="closeModal()">&times;</button><h2>光模块详细参数</h2><div class="pn-display">${pn}<button class="copy-btn" onclick="copyPN(this,'${pn}')">&#x1F4CB; 复制</button>${docLink}</div><div class="spec-grid">${detailHtml}</div>`;
document.getElementById("modalOverlay").classList.add("show")}

function copyPN(btnOrEl,pn){
const isBtn=btnOrEl.classList&&btnOrEl.classList.contains("copy-btn");
if(navigator.clipboard&&navigator.clipboard.writeText){
navigator.clipboard.writeText(pn).then(()=>{showCopied(btnOrEl,isBtn)}).catch(()=>{fallbackCopy(pn);showCopied(btnOrEl,isBtn)});
}else{fallbackCopy(pn);showCopied(btnOrEl,isBtn)}}
function fallbackCopy(pn){const ta=document.createElement("textarea");ta.value=pn;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta)}
function showCopied(el,isBtn){
if(isBtn){el.innerHTML="&#x2713; 已复制";el.classList.add("copied");setTimeout(()=>{el.innerHTML="&#x1F4CB; 复制";el.classList.remove("copied")},1500)}
else{const orig=el.textContent;el.textContent="已复制!";el.style.color="var(--accent)";setTimeout(()=>{el.textContent=orig;el.style.color=""},1200)}}
function closeModal(){document.getElementById("modalOverlay").classList.remove("show")}
document.getElementById("modalOverlay").addEventListener("click",function(e){if(e.target===this)closeModal()});

function treeFolder(icon,label,id,open){
return`<div class="tree-item" style="--depth:0" data-toggle="${id}"><span class="arrow${open?' open':''}">&#x25B6;</span><span class="icon">${icon}</span>${label}</div><div class="tree-children${open?' open':''}" id="${id}">`}
function treeSubFolder(icon,label,id,open){
return`<div class="tree-item" style="--depth:1" data-toggle="${id}"><span class="arrow${open?' open':''}">&#x25B6;</span><span class="icon">${icon}</span>${label}</div><div class="tree-children${open?' open':''}" id="${id}">`}
function treeLeaf(label,nav){
return`<div class="tree-item" style="--depth:2" data-nav="${nav}"><span class="arrow" style="visibility:hidden">&#x25B6;</span>${label}</div>`}

// bind folder toggles after build
document.addEventListener('click',function(e){
const item=e.target.closest('.tree-item[data-toggle]');
if(!item)return;
const id=item.dataset.toggle;
const children=document.getElementById(id);
const arrow=item.querySelector('.arrow');
if(children){children.classList.toggle('open');arrow&&arrow.classList.toggle('open')}
});

function navigate(navId){
const main=document.getElementById("main");
activeNav=navId;
if(navId.startsWith("nav-dev-")){
const devId=navId.replace("nav-dev-","");
const d=DATA.find(x=>x.id===devId);
if(d){
main.innerHTML=`<div class="legend"><span><span class="dot" style="background:var(--ib)"></span> InfiniBand</span><span><span class="dot" style="background:var(--eth)"></span> Ethernet</span><span><span class="dot" style="background:var(--accent)"></span> LinkX 原厂</span></div>`+renderCard(d);
const card=main.querySelector('.card');if(card)card.classList.add('open');
}}
else if(navId.startsWith("nav-cat-")){
const cat=navId.replace("nav-cat-","");
if(cat==="all-mod"||CATALOG.some(g=>g.cat===cat)){
main.innerHTML=`<div class="section-title" style="margin-top:0"><span class="icon">&#x1F4D6;</span> LinkX 全产品目录 — ${cat==="all-mod"?"全部":(catalogCatNames[cat]||cat)}</div>`+renderCatalogTable(cat==="all-mod"?null:cat);
}}
else if(navId==="nav-arch"||navId==="nav-arch-hopper"||navId==="nav-arch-blackwell"||navId==="nav-arch-rubin"){
main.innerHTML=renderArchOverview();
}
else{
main.innerHTML=`<div class="legend"><span><span class="dot" style="background:var(--ib)"></span> InfiniBand</span><span><span class="dot" style="background:var(--eth)"></span> Ethernet</span><span><span class="dot" style="background:var(--accent)"></span> LinkX 原厂</span></div>`;
catOrder.forEach(c=>{
const devs=DATA.filter(d=>d.cat===c);
main.innerHTML+=`<div class="section-title"><span class="icon">${catIcons[c]}</span>${catNames[c]}</div>`;
devs.forEach(d=>main.innerHTML+=renderCard(d));
});
}
main.innerHTML+=`<div id="footer-container"></div>`;
}

buildSidebar();
navigate("nav-dev-qx800");
document.querySelector('[data-nav="nav-dev-qx800"]')&&document.querySelector('[data-nav="nav-dev-qx800"]').classList.add("active");
</script>
<script src="../assets/config.js"></script>
<script src="../assets/footer.js"></script>
</body>
</html>
