<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光模块计算器 - JTools-OCalc</title>
    <link rel="stylesheet" href="../home/style.css">
    <link rel="stylesheet" href="optical.css">
    <link rel="icon" href="../assets/JTools-light.ico" type="image/x-icon">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="header-content">
                <div class="nav-bar">
                    <a href="../home/index.html" class="back-button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>返回首页</span>
                    </a>
                    <div class="page-title">
                        <span class="page-icon">💡</span>
                        <h1>光模块计算器</h1>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="app-main">
            <div class="container">
                <div class="calculator-grid">
                    <!-- DDM参数转换 -->
                    <div class="calculator-card">
                        <div class="card-header">
                            <div class="card-icon">🌡️</div>
                            <h2>DDM 参数转换</h2>
                        </div>

                        <div class="param-list">
                            <!-- 温度 -->
                            <div class="param-row">
                                <div class="param-label">温度 (℃)</div>
                                <input class="input" type="number" id="temperature" placeholder="温度值" step="0.001">
                                <span class="separator">⇄</span>
                                <input class="input hex" type="text" id="tempHex" placeholder="寄存器值">
                                <button class="btn-convert" onclick="convertTemp()">转换</button>
                            </div>

                            <!-- 电压 -->
                            <div class="param-row">
                                <div class="param-label">电压 (V)</div>
                                <input class="input" type="number" id="voltage" placeholder="电压值" step="0.001">
                                <span class="separator">⇄</span>
                                <input class="input hex" type="text" id="voltHex" placeholder="寄存器值">
                                <button class="btn-convert" onclick="convertVolt()">转换</button>
                            </div>

                            <!-- 偏置电流 -->
                            <div class="param-row">
                                <div class="param-label">偏置电流 (mA)</div>
                                <input class="input" type="number" id="current" placeholder="电流值" step="0.001">
                                <span class="separator">⇄</span>
                                <input class="input hex" type="text" id="currentHex" placeholder="寄存器值">
                                <button class="btn-convert" onclick="convertCurrent()">转换</button>
                            </div>

                            <!-- 光功率 -->
                            <div class="param-row">
                                <div class="param-label">光功率 (dBm)</div>
                                <input class="input" type="number" id="power" placeholder="功率值" step="0.001">
                                <span class="separator">⇄</span>
                                <input class="input hex" type="text" id="powerHex" placeholder="寄存器值">
                                <button class="btn-convert" onclick="convertPower()">转换</button>
                            </div>
                        </div>
                    </div>

                    <!-- BER/SNR转换 -->
                    <div class="calculator-card">
                        <div class="card-header">
                            <div class="card-icon">📊</div>
                            <h2>BER/SNR 转换</h2>
                        </div>

                        <div class="param-list">
                            <!-- BER -->
                            <div class="param-row">
                                <div class="param-label">误码率 (BER)</div>
                                <input class="input" type="text" id="ber" placeholder="如: 1.0e-12">
                                <span class="separator">⇄</span>
                                <input class="input hex" type="text" id="berHex" placeholder="寄存器值">
                                <button class="btn-convert" onclick="convertBer()">转换</button>
                            </div>

                            <!-- SNR -->
                            <div class="param-row">
                                <div class="param-label">信噪比 (SNR)</div>
                                <input class="input" type="number" id="snr" placeholder="SNR值(dB)" step="0.01">
                                <span class="separator">⇄</span>
                                <input class="input hex" type="text" id="snrHex" placeholder="寄存器值">
                                <button class="btn-convert" onclick="convertSnr()">转换</button>
                            </div>
                        </div>
                    </div>

                    <!-- 光功率单位转换 -->
                    <div class="calculator-card">
                        <div class="card-header">
                            <div class="card-icon">⚡</div>
                            <h2>光功率单位转换</h2>
                        </div>

                        <div class="param-list">
                            <div class="param-row">
                                <div class="param-label">功率转换</div>
                                <input class="input" type="number" id="mw" placeholder="mW值" step="0.001">
                                <span class="separator">⇄</span>
                                <input class="input" type="number" id="dbm" placeholder="dBm值" step="0.001">
                                <button class="btn-convert" onclick="convertPowerUnit()">转换</button>
                            </div>
                        </div>
                    </div>

                    <!-- 可靠性单位转换 -->
                    <div class="calculator-card">
                        <div class="card-header">
                            <div class="card-icon">🔧</div>
                            <h2>可靠性单位转换</h2>
                        </div>

                        <div class="param-list">
                            <div class="param-row">
                                <div class="param-label">可靠性转换</div>
                                <input class="input" type="number" id="fit" placeholder="FIT值" step="0.001">
                                <span class="separator">⇄</span>
                                <input class="input" type="number" id="ppm" placeholder="PPM值" step="0.001">
                                <button class="btn-convert" onclick="convertReliability()">转换</button>
                            </div>
                            <div class="param-note">
                                <small>FIT (Failures In Time): 10⁹小时内的失效次数</small><br>
                                <small>PPM (Parts Per Million): 百万分之一缺陷率</small><br>
                                <small>注：10⁹小时 ≈ 114,077年 ≈ 1,368,925月</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 清空按钮 -->
                <div class="action-bar">
                    <button class="btn-clear" onclick="clearAll()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        <span>清空所有</span>
                    </button>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
    </div>

    <script src="../assets/config.js"></script>
    <script src="../assets/footer.js"></script>
    <script src="optical.js"></script>
</body>
</html>
